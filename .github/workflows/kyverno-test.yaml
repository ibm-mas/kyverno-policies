name: Kyverno Policy Tests

on:
  push:
    paths:
      - 'policies/**'
      - '.github/workflows/kyverno-test.yaml'

jobs:
  test-policies:
    runs-on: ubuntu-latest
    name: Test Kyverno Policies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Kyverno CLI
        run: |
          # Install latest Kyverno CLI
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.11.4/kyverno-cli_v1.11.4_linux_x86_64.tar.gz
          tar -xzf kyverno-cli_v1.11.4_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/
          kyverno version

      - name: Run Kyverno Tests
        run: |
          echo "Running Kyverno policy tests..."
          kyverno test policies
