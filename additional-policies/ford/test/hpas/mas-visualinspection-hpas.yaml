---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mas-visualinspection-auth-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dev910e-auth
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
