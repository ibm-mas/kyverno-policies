---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-with-sizelimit
  namespace: mas-dev-core
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      volumeMounts:
        - name: cache-volume
          mountPath: /cache
  volumes:
    - name: cache-volume
      emptyDir:
        sizeLimit: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-without-sizelimit
  namespace: mas-dev-core
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      volumeMounts:
        - name: cache-volume
          mountPath: /cache
  volumes:
    - name: cache-volume
      emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-multiple-volumes
  namespace: mas-dev-core
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      volumeMounts:
        - name: cache-volume
          mountPath: /cache
        - name: tmp-volume
          mountPath: /tmp
  volumes:
    - name: cache-volume
      emptyDir:
        sizeLimit: 500Mi
    - name: tmp-volume
      emptyDir:
        sizeLimit: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-mixed-volumes
  namespace: mas-dev-core
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      volumeMounts:
        - name: cache-volume
          mountPath: /cache
        - name: tmp-volume
          mountPath: /tmp
  volumes:
    - name: cache-volume
      emptyDir:
        sizeLimit: 500Mi
    - name: tmp-volume
      emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-no-emptydir
  namespace: mas-dev-core
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: my-config
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-emptydir-memory
  namespace: mas-dev-core
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      volumeMounts:
        - name: memory-volume
          mountPath: /memory
  volumes:
    - name: memory-volume
      emptyDir:
        medium: Memory
        sizeLimit: 256Mi
